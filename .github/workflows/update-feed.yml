name: Update feed

on:
  schedule:
    # Translations are cached per item (see fetch_and_translate.py), so a run
    # over unchanged items makes ZERO Claude calls — only genuinely new items
    # cost tokens. That means run frequency is essentially free, so we run often
    # enough to guarantee fresh World Cup scores for a UK morning read:
    #   05:23 UTC (06:23 BST)  ┐ two morning slots an hour apart hedge GitHub's
    #   06:23 UTC (07:23 BST)  ┘ best-effort scheduler so one lands before ~07:30
    #   12:23 UTC (13:23 BST)    midday refresh
    #   21:23 UTC (22:23 BST)    evening — catches US afternoon kickoffs
    # World Cup results use days_back=3, so any dropped slot is backfilled by the
    # next run. The job only commits when feed.json actually changes.
    - cron: "23 5,6,12,21 * * *"
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and translate feeds
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_SECRET_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python fetch_and_translate.py

      - name: Commit updated feed.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update feed.json ($(date -u +%Y-%m-%d))"
          git push
