name: Update feed

on:
  schedule:
    # GitHub's scheduled triggers are best-effort and frequently delay/drop
    # individual slots under load. Run every 6 hours (off-peak minute) so a
    # missed slot is covered within hours and World Cup scores refresh through
    # the day. The job only commits when feed.json actually changes.
    - cron: "23 0,6,12,18 * * *"   # 00:23 / 06:23 / 12:23 / 18:23 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and translate feeds
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_SECRET_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          # To translate locally for free, point at a reachable Ollama (e.g. a
          # home M1 exposed over Tailscale) and uncomment. Claude above then acts
          # as fallback. See README → "Translation backends".
          # TRANSLATE_BACKEND: ollama
          # OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
          # OLLAMA_MODEL: qwen2.5:7b-instruct
        run: python fetch_and_translate.py

      - name: Commit updated feed.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update feed.json ($(date -u +%Y-%m-%d))"
          git push
