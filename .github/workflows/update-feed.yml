name: Update feed (manual fallback)

# The primary updater is the home M1: scripts/run-pipeline.sh runs on a launchd
# timer, translates locally via Ollama, and pushes feed.json outbound to GitHub.
# Nothing reaches into the M1.
#
# This workflow is a manual break-glass only — if the M1 is down, run it from the
# Actions tab to refresh feed.json via the Claude API (needs ANTHROPIC_SECRET_KEY
# with credit). It is intentionally NOT scheduled, to avoid double-commits.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TRANSLATE_BACKEND: claude
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_SECRET_KEY }}
      FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and translate feeds
        run: python fetch_and_translate.py

      - name: Commit updated feed.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update feed.json ($(date -u +%Y-%m-%d))"
          git push
