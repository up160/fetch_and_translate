name: Update feed

on:
  schedule:
    # GitHub's scheduled triggers are best-effort and frequently delay/drop
    # individual slots under load. Twice daily (off-peak minute) keeps API
    # spend minimal while a missed slot is still covered the same day; the
    # per-item translation cache means reruns over unchanged items make zero
    # Claude calls anyway. The job only commits when feed.json changed.
    # (If fresher World Cup scores matter more than a few $/year, restore
    # the old 4-slot line: "23 5,6,12,21 * * *".)
    - cron: "23 6,18 * * *"   # 06:23 / 18:23 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

# Never run two updates at once — both would race to push to main.
concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # Normal runs finish in ~2-3 min; a hung feed or API call must not
    # burn the default 6-hour job limit.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and translate feeds
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_SECRET_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python fetch_and_translate.py

      - name: Commit updated feed.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update feed.json ($(date -u +%Y-%m-%d))"
          # main may have moved (e.g. a merged PR) while this job ran
          git pull --rebase origin main
          git push

      - name: Alert if translation is broken
        # Translation failures are non-fatal by design (English fallback), so a
        # dead API key or empty credit balance would otherwise stay green
        # forever. Runs after the commit step: content still publishes, but the
        # job goes red so GitHub notifies the repo owner. Normal runs sit well
        # under the threshold — only proper-noun headlines stay English.
        run: |
          python - <<'EOF'
          import json
          items = json.load(open("feed.json"))["items"]
          same = sum(1 for i in items if i["title_es"] == i["title_en"])
          frac = same / max(len(items), 1)
          print(f"{same}/{len(items)} items untranslated ({frac:.0%})")
          if frac > 0.8:
              print("::error::Translation looks broken (expired key? no API credits?) "
                    "- feed.json was still published, but mostly in English. "
                    "Check the 'Fetch and translate feeds' step log.")
              raise SystemExit(1)
          EOF
